name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goarch: amd64
            output: goscope-linux-amd64
          - os: windows-latest
            goarch: amd64
            output: goscope-windows-amd64.exe
          - os: macos-latest   # Apple Silicon runner → arm64 네이티브
            goarch: arm64
            output: goscope-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install libpcap (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libpcap-dev

      - name: Install Npcap SDK (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile npcap-sdk.zip
          Expand-Archive npcap-sdk.zip -DestinationPath C:\npcap-sdk
          echo "CGO_CFLAGS=-I C:/npcap-sdk/Include" >> $env:GITHUB_ENV
          echo "CGO_LDFLAGS=-L C:/npcap-sdk/Lib/x64" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Build
        env:
          GOARCH: ${{ matrix.goarch }}
        run: go build -o dist/${{ matrix.output }} ./cmd/goscope

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 텔레그램 알림 (릴리즈 시작)
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=-1003854517077" \
            --data-urlencode "text=🚀 릴리즈 시작
태그: ${{ github.ref_name }}
레포: ${{ github.repository }}
🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*

      - name: 텔레그램 알림 (결과)
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            ICON="✅"
            STATUS="릴리즈 성공"
          else
            ICON="❌"
            STATUS="릴리즈 실패"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=-1003854517077" \
            --data-urlencode "text=${ICON} ${STATUS}
태그: ${{ github.ref_name }}
레포: ${{ github.repository }}
🔗 ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
